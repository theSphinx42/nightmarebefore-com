  <body>
    <canvas id="nb-ash" aria-hidden="true"></canvas>
    <div id="root"></div>
    <script>
      (function () {
        const canvas = document.getElementById('nb-ash');
        const ctx    = canvas.getContext('2d');
        let W, H;

        function resize() {
          W = canvas.width  = window.innerWidth;
          H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // 45 deterministic particles — golden-ratio spread avoids clumping
        const particles = Array.from({ length: 45 }, (_, i) => ({
          x:     (i * 137.508) % 100,
          y:     (i * 71.3)   % 100,
          size:  0.8 + (i % 7) * 0.22,
          speed: 0.10 + (i % 6) * 0.055,
          drift: ((i % 9) - 4) * 0.016,
          alpha: 0.12 + (i % 7) * 0.04,
          ember: i % 7 === 0,
        }));

        function draw(ts) {
          ctx.clearRect(0, 0, W, H);

          particles.forEach(p => {
            p.y -= p.speed;
            p.x += p.drift;

            if (p.y < -2)  { p.y = 102; p.x = (p.x + 13.7) % 100; }
            if (p.x < -2)  p.x = 102;
            if (p.x > 102) p.x = -2;

            const px    = (p.x / 100) * W;
            const py    = (p.y / 100) * H;
            const pulse = p.ember ? 0.55 + 0.45 * Math.sin(ts * 0.0018 + p.size * 2.8) : 1;

            ctx.save();
            ctx.globalAlpha = p.alpha * pulse;

            if (p.ember) {
              ctx.fillStyle  = '#D94C0A';
              ctx.shadowColor = '#D94C0A';
              ctx.shadowBlur  = 7;
            } else {
              ctx.fillStyle  = '#B89080';
              ctx.shadowBlur = 0;
            }

            ctx.beginPath();
            ctx.ellipse(px, py, p.size, p.size * 0.55, p.drift * 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          });

          requestAnimationFrame(draw);
        }

        requestAnimationFrame(draw);
      })();
    </script>
  </body>
